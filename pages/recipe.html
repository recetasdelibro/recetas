<!DOCTYPE html>
<html lang="es">
<script src="../js/search.js"></script>
<script src="../js/recipe.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receta</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<!-- HEADER -->
<header>
    <img src="/recetas/assets/images/logo.jpg" alt="Logo" class="logo">

    <!-- Search bar -->
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar...">
        <button id="search-btn">Buscar</button>
        <button id="filter-btn">Filtros</button>
    </div>

    <nav>
        <a href="../index.html">Inicio</a>
        <a href="about.html">Sobre mí</a>
        <a href="contact.html">Contacto</a>
    </nav>
</header>

<!-- MAIN -->
<main>
    <article class="recipe">
        <h1 id="recipe-title"></h1>

        <img id="recipe-image" class="recipe-image" src="" alt="Recipe image">

        <section class="ingredients">
            <h2>Ingredientes</h2>
            <ul id="ingredients-list"></ul>
        </section>

        <section class="procedure">
            <h2>Preparación</h2>
            <ol id="procedure-list"></ol>
        </section>
    </article>
</main>

<!-- FOOTER -->
<footer>
    <p>© 2026 Recetas de libro</p>
</footer>

</body>
</html>
