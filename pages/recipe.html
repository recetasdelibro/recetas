<!DOCTYPE html>
<html lang="es">
<script src="../js/search.js"></script>
<script src="../js/category.js"></script>
<script src="../js/recipe.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receta</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-top">
        <img src="/recetas/assets/images/logo.jpg" alt="Logo" class="logo">
        <button id="mobile-menu-btn" class="mobile-menu-btn">☰</button>
    </div>

    <!-- Search bar -->
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar...">
        <button id="search-btn">🔍</button>
        <button id="filter-btn" hidden="true">Filtros</button>
        <div class="dropdown">
            <button id="category-btn" class="dropbtn">Categorías</button>
            <div id="category-dropdown" class="dropdown-content">
                <a href="#" data-category="principales">Principales</a>
                <a href="#" data-category="entradas">Entradas</a>
                <a href="#" data-category="postres">Postres</a>
                <a href="#" data-category="parrilla">Parrilla</a>
                <a href="#" data-category="salsas">Salsas</a>
                <a href="#" data-category="pastas">Pastas</a>
            </div>
        </div>
    </div>

    <nav id="main-nav">
        <a href="../index.html">Inicio</a>
        <a href="review_list.html">Reseñas</a>
        <a href="about.html">Sobre mí</a>
        <a href="contact.html" hidden="true">Contacto</a>
    </nav>
</header>

<!-- MAIN -->
<main>
    <article class="recipe">
        <h1 id="recipe-title"></h1>
        <p id="recipe-servings" class="servings"></p>

        <img id="recipe-image" class="recipe-image" src="" alt="Recipe image" loading="lazy">

        <section class="ingredients">
            <h2>Ingredientes</h2>
            <ul id="ingredients-list"></ul>
        </section>

        <section class="procedure">
            <h2>Preparación</h2>
            <ol id="procedure-list"></ol>
        </section>

        <div class="like-container">
            <button id="like-btn" class="like-btn" aria-label="Me gusta">
                <svg id="heart-icon" class="heart-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
            </button>
            <span id="like-count" class="like-count"></span>
        </div>
    </article>
</main>

<script src="../js/mobile-menu.js"></script>

<!-- FOOTER -->
<footer>
    <p>© 2026 Recetas de libro</p>
</footer>

</body>
</html>
